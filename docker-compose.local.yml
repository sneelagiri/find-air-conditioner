services:
  app:
    build:
      context: .
      dockerfile: src/FindAirConditioners.Web/Dockerfile
    container_name: findac-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      queue:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: findac-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-findac}
      POSTGRES_USER: ${POSTGRES_USER:-findac}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-findac_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - findac_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-findac} -d ${POSTGRES_DB:-findac}"]
      interval: 10s
      timeout: 5s
      retries: 5

  queue:
    image: rabbitmq:3-management-alpine
    container_name: findac-queue
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-findac}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-findac_password}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - findac_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: findac-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  findac_postgres_data:
  findac_rabbitmq_data:
