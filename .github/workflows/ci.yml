name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore FindAirConditioners.sln

      - name: Build
        run: dotnet build FindAirConditioners.sln --no-restore -c Release

      - name: Test
        run: dotnet test FindAirConditioners.sln --no-build -c Release
